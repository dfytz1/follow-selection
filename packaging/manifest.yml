name: follow-selection
version: 1.1.4
authors:
  - GIA
description: >
  Follow selection — Grasshopper canvas toolbar toggle. While enabled, selected components and
  parameters that have preview off still draw in the Rhino viewport via a display conduit, without
  changing Preview On/Off or breaking copy/paste. v1.1.4: Yak package layout fixed (single .gha per
  runtime folder only — avoids duplicate FollowSelection assembly load). v1.1.3: shaded meshes depth-tested,
  wires in foreground.
