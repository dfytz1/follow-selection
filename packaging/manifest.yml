name: follow-selection
version: 1.1.5
authors:
  - GIA
description: >
  Follow selection — Grasshopper canvas toolbar toggle. While enabled, selected components and
  parameters that have preview off still draw in the Rhino viewport via a display conduit, without
  changing Preview On/Off or breaking copy/paste. v1.1.5: follow-selection preview works inside
  nested clusters; toolbar button re-registers when the Grasshopper editor is reopened.
